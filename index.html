<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inklings — the ideas you keep sending each other</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%237A4A57'/><path d='M12 4.4C12 4.4 6.4 11 6.4 14.6a5.6 5.6 0 1 0 11.2 0C17.6 11 12 4.4 12 4.4Z' fill='%23F4EEE3'/><circle cx='9.6' cy='14.4' r='1.4' fill='%237A4A57' opacity='0.28'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%237A4A57'/><path d='M12 4.4C12 4.4 6.4 11 6.4 14.6a5.6 5.6 0 1 0 11.2 0C17.6 11 12 4.4 12 4.4Z' fill='%23F4EEE3'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EEE3;
    --paper-2:#FDFBF6;
    --paper-3:#FBF6EC;
    --ink:#322E28;
    --ink-soft:#6E675B;
    --ink-faint:#9A9081;
    --rule:#E5DBCB;
    --rule-strong:#CFC3AE;
    --brand:#7A4A57;
    --brand-deep:#603946;
    --shadow:rgba(60,48,40,.14);

    /* category tab colours — these encode which divider you're in */
    --c-home:#B4623B;
    --c-wedding:#B26A7E;
    --c-parties:#C39537;
    --c-kids:#5E8C7E;
    --c-travel:#4E7A93;
    --c-recipes:#7E7A3C;
    --c-custom:#7A6E5C;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  /* faint paper texture */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(circle at 20% 30%, rgba(0,0,0,.015) 0, transparent 55%),
                     radial-gradient(circle at 80% 70%, rgba(0,0,0,.015) 0, transparent 55%);
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink);}
  .mono{font-family:'Space Mono',monospace;}
  .serif{font-family:'Fraunces',Georgia,serif;}
  a{color:var(--brand);}

  .hidden{display:none !important;}

  /* ---------- COVER / LOGIN ---------- */
  #cover{
    position:relative;z-index:1;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .cover-card{
    width:100%;max-width:440px;background:var(--paper-2);
    border:1px solid var(--rule-strong);border-radius:6px;
    box-shadow:0 24px 60px -30px var(--shadow);
    padding:40px 38px 34px;position:relative;overflow:hidden;
  }
  .cover-card::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:10px;
    background:linear-gradient(var(--brand),var(--brand-deep));
  }
  .cover-eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--ink-faint);margin:0 0 14px;}
  .cover-title{font-family:'Fraunces',serif;font-weight:600;font-size:42px;line-height:1.02;
    margin:0 0 10px;letter-spacing:-.01em;}
  .cover-title em{font-style:italic;color:var(--brand);}
  .cover-sub{color:var(--ink-soft);font-size:15px;margin:0 0 26px;max-width:34ch;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-family:'Space Mono',monospace;font-size:11px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;}
  .field input, .field textarea, .field select{
    width:100%;padding:11px 13px;background:var(--paper-3);
    border:1px solid var(--rule-strong);border-radius:4px;outline:none;transition:border-color .15s;
  }
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--brand);}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 18px;background:var(--brand);color:#fff;border-radius:4px;
    font-weight:600;font-size:14px;letter-spacing:.01em;transition:background .15s,transform .05s;
  }
  .btn:hover{background:var(--brand-deep);}
  .btn:active{transform:translateY(1px);}
  .btn-block{width:100%;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--rule-strong);}
  .btn-ghost:hover{background:var(--paper-3);color:var(--ink);}
  .btn-small{padding:7px 12px;font-size:13px;}
  .cover-existing{margin-top:26px;padding-top:20px;border-top:1px dashed var(--rule-strong);}
  .cover-existing p{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-faint);margin:0 0 10px;}
  .profile-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .profile-chip{padding:7px 12px;background:var(--paper-3);border:1px solid var(--rule-strong);
    border-radius:20px;font-size:13px;font-weight:500;transition:all .15s;}
  .profile-chip:hover{border-color:var(--brand);color:var(--brand);}
  .cover-note{margin-top:22px;font-size:12px;color:var(--ink-faint);line-height:1.5;}
  .err{color:#a23b3b;font-size:13px;margin-top:-6px;margin-bottom:12px;min-height:1px;}

  /* ---------- APP SHELL ---------- */
  #app{position:relative;z-index:1;min-height:100vh;}
  .topbar{
    position:sticky;top:0;z-index:20;background:var(--paper-2);
    border-bottom:1px solid var(--rule-strong);
    display:flex;align-items:center;gap:16px;padding:12px 20px;flex-wrap:wrap;
  }
  .brandmark{font-family:'Fraunces',serif;font-weight:600;font-size:20px;letter-spacing:-.01em;
    display:flex;align-items:baseline;gap:8px;white-space:nowrap;}
  .brandmark span{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--ink-faint);font-weight:400;}
  .quickadd{flex:1;min-width:240px;display:flex;gap:8px;}
  .quickadd input{flex:1;padding:10px 14px;background:var(--paper-3);
    border:1px solid var(--rule-strong);border-radius:22px;outline:none;transition:border-color .15s;}
  .quickadd input:focus{border-color:var(--brand);}
  .whoami{display:flex;align-items:center;gap:10px;white-space:nowrap;}
  .whoami .who{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft);}
  .whoami .who b{color:var(--ink);}
  .icon-btn{padding:8px 12px;border:1px solid var(--rule-strong);border-radius:4px;
    font-size:13px;color:var(--ink-soft);background:var(--paper-3);transition:all .15s;}
  .icon-btn:hover{border-color:var(--brand);color:var(--brand);}

  .layout{display:grid;grid-template-columns:232px 1fr;gap:0;max-width:1180px;margin:0 auto;}
  /* --- binder divider tabs --- */
  .tabs{padding:26px 0 40px 0;border-right:1px solid var(--rule);min-height:60vh;}
  .tabs-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-faint);padding:0 20px 12px;}
  .tab{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    padding:11px 16px 11px 20px;font-size:14.5px;font-weight:500;color:var(--ink-soft);
    border-left:4px solid transparent;transition:all .13s;position:relative;
  }
  .tab .emoji{font-size:16px;width:20px;text-align:center;}
  .tab .tname{flex:1;}
  .tab .tcount{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-faint);
    background:var(--paper-3);padding:1px 7px;border-radius:10px;}
  .tab:hover{background:var(--paper-3);color:var(--ink);}
  .tab.active{background:var(--paper-2);color:var(--ink);border-left-color:var(--tabcolor,var(--brand));font-weight:600;}
  .tab.active .tcount{background:var(--tabcolor,var(--brand));color:#fff;}
  .tab-add{margin:14px 20px 0;font-family:'Space Mono',monospace;font-size:12px;
    color:var(--ink-faint);padding:6px 0;}
  .tab-add:hover{color:var(--brand);}

  /* --- content --- */
  .content{padding:30px 34px 80px;min-width:0;}
  .content-head{display:flex;align-items:flex-end;justify-content:space-between;
    gap:16px;flex-wrap:wrap;margin-bottom:6px;border-bottom:2px solid var(--headcolor,var(--brand));
    padding-bottom:12px;}
  .content-head h1{font-family:'Fraunces',serif;font-weight:600;font-size:34px;margin:0;
    letter-spacing:-.01em;display:flex;align-items:center;gap:12px;}
  .content-head .h-emoji{font-size:28px;}
  .content-tools{display:flex;gap:8px;align-items:center;}
  .searchbox{padding:8px 13px;background:var(--paper-2);border:1px solid var(--rule-strong);
    border-radius:20px;outline:none;width:180px;transition:border-color .15s,width .2s;}
  .searchbox:focus{border-color:var(--brand);width:220px;}
  .cat-desc{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-faint);
    margin:14px 0 26px;letter-spacing:.03em;}

  .subgroup{margin-bottom:38px;}
  .subhead{display:flex;align-items:center;gap:12px;margin:0 0 16px;}
  .subhead h2{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:20px;margin:0;}
  .subhead .rule{flex:1;height:1px;background:var(--rule);}
  .subhead .n{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-faint);}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
  .card{
    background:var(--paper-2);border:1px solid var(--rule-strong);border-radius:5px;
    padding:0;overflow:hidden;position:relative;transition:transform .12s,box-shadow .12s;
    display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 14px 28px -18px var(--shadow);}
  .card-tab{height:6px;background:var(--cardcolor,var(--brand));}
  .card-body{padding:16px 17px 15px;flex:1;display:flex;flex-direction:column;}
  .card-meta{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px;display:flex;
    gap:6px;flex-wrap:wrap;align-items:center;}
  .card-meta .plat{color:var(--cardcolor,var(--brand));font-weight:700;}
  .card h3{font-family:'Fraunces',serif;font-weight:600;font-size:19px;line-height:1.18;
    margin:0 0 8px;letter-spacing:-.005em;}
  .card .details{font-size:14px;color:var(--ink-soft);line-height:1.55;white-space:pre-wrap;
    /* ruled-paper baseline nod */
    margin:0 0 12px;flex:1;}
  .card .details.clamp{display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden;}
  .card .expand{font-family:'Space Mono',monospace;font-size:11px;color:var(--brand);
    align-self:flex-start;margin:-6px 0 12px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .tag{font-family:'Space Mono',monospace;font-size:11px;background:var(--paper-3);
    border:1px solid var(--rule);color:var(--ink-soft);padding:2px 8px;border-radius:3px;}
  .card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding-top:11px;border-top:1px solid var(--rule);}
  .status{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;
    text-transform:uppercase;padding:3px 8px;border-radius:3px;font-weight:700;}
  .status.idea{background:#efe9dc;color:#8a7f68;}
  .status.love{background:#f6e4ea;color:#b26a7e;}
  .status.decided{background:#e3efe9;color:#4c7a68;}
  .card-actions{display:flex;gap:6px;}
  .card-actions button{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-faint);
    padding:3px 6px;border-radius:3px;transition:all .13s;}
  .card-actions button:hover{color:var(--brand);background:var(--paper-3);}
  .card-actions a.src{font-family:'Space Mono',monospace;font-size:11px;text-decoration:none;
    color:var(--ink-faint);padding:3px 6px;border-radius:3px;transition:all .13s;}
  .card-actions a.src:hover{color:var(--cardcolor,var(--brand));background:var(--paper-3);}
  .cost{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-soft);}

  /* empty state */
  .empty{border:1px dashed var(--rule-strong);border-radius:6px;padding:44px 30px;text-align:center;
    color:var(--ink-soft);background:var(--paper-2);}
  .empty h3{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:22px;
    margin:0 0 8px;color:var(--ink);}
  .empty p{margin:0 auto 18px;max-width:40ch;font-size:14px;}

  /* ---------- MODAL / EDIT FORM ---------- */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(46,38,32,.5);
    display:flex;align-items:flex-start;justify-content:center;padding:40px 18px;overflow-y:auto;
    backdrop-filter:blur(2px);}
  .modal{width:100%;max-width:560px;background:var(--paper-2);border-radius:7px;
    border:1px solid var(--rule-strong);box-shadow:0 30px 80px -20px rgba(0,0,0,.45);
    overflow:hidden;animation:pop .18s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
  .modal-head{padding:20px 26px 16px;border-bottom:1px solid var(--rule);
    display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
  .modal-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin:0;}
  .modal-head p{margin:5px 0 0;font-size:13px;color:var(--ink-soft);}
  .modal-close{font-size:22px;color:var(--ink-faint);line-height:1;padding:2px 6px;}
  .modal-close:hover{color:var(--ink);}
  .modal-body{padding:22px 26px;}
  .preview-strip{display:flex;align-items:center;gap:10px;background:var(--paper-3);
    border:1px solid var(--rule);border-radius:5px;padding:10px 13px;margin-bottom:20px;font-size:13px;}
  .preview-strip .badge{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:3px;color:#fff;}
  .preview-strip .u{color:var(--ink-soft);word-break:break-all;font-family:'Space Mono',monospace;font-size:12px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .modal-foot{padding:16px 26px 22px;border-top:1px solid var(--rule);
    display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .modal-foot .left{display:flex;gap:8px;}
  textarea.big{min-height:120px;resize:vertical;line-height:1.55;}
  .hint{font-size:12px;color:var(--ink-faint);margin-top:5px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:6px;font-size:14px;
    z-index:80;opacity:0;transition:all .25s;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);
    display:flex;align-items:center;gap:10px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* mobile */
  @media(max-width:860px){
    .layout{grid-template-columns:1fr;}
    .tabs{border-right:none;border-bottom:1px solid var(--rule);min-height:auto;padding:14px 0;
      display:flex;overflow-x:auto;gap:4px;align-items:stretch;}
    .tabs-label,.tab-add{display:none;}
    .tab{flex-direction:column;gap:3px;padding:8px 14px;border-left:none;border-bottom:4px solid transparent;
      white-space:nowrap;width:auto;font-size:13px;}
    .tab .tname{flex:none;}
    .tab.active{border-left:none;border-bottom-color:var(--tabcolor,var(--brand));}
    .content{padding:22px 18px 70px;}
    .content-head h1{font-size:27px;}
    .cover-title{font-size:34px;}
    .row2{grid-template-columns:1fr;}
    .topbar{gap:10px;}
    .quickadd{order:3;flex-basis:100%;}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important;}
  }
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;}
</style>
</head>
<body>

<!-- ============ COVER ============ -->
<div id="cover">
  <div class="cover-card">
    <p class="cover-eyebrow">Inklings</p>
    <h1 class="cover-title">The things you keep<br>sending <em>each other</em>.</h1>
    <p class="cover-sub">Paste a link, put the idea down in ink, and it files itself — sorted like a real notebook instead of drowning in your feed.</p>

    <div class="field">
      <label for="loginName">Whose binder is this?</label>
      <input id="loginName" type="text" placeholder="e.g. kajal" autocomplete="off" maxlength="24" />
    </div>
    <div class="field">
      <label for="loginPass">Passcode <span style="text-transform:none;letter-spacing:0;">(optional — set one to keep it private on a shared device)</span></label>
      <input id="loginPass" type="password" placeholder="••••" autocomplete="off" maxlength="24" />
    </div>
    <div class="err" id="loginErr"></div>
    <button class="btn btn-block" id="loginBtn">Open the binder</button>

    <div class="cover-existing hidden" id="existingWrap">
      <p>Or reopen</p>
      <div class="profile-chips" id="profileChips"></div>
    </div>

    <p class="cover-note" id="coverNote"></p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="brandmark">Inklings <span>kept, not lost</span></div>
    <div class="quickadd">
      <input id="quickInput" type="text" placeholder="Paste a TikTok / Instagram / any link — or type an idea, then press Enter" />
      <button class="btn btn-small" id="quickBtn">Save it</button>
    </div>
    <div class="whoami">
      <span class="who">Kept by <b id="whoName"></b></span>
      <button class="icon-btn" id="exportBtn" title="Download a backup of this binder">Backup</button>
      <button class="icon-btn" id="importBtn" title="Load a binder from a backup file">Restore</button>
      <button class="icon-btn" id="logoutBtn">Switch</button>
      <input id="importFile" type="file" accept="application/json,.json" class="hidden" />
    </div>
  </div>

  <div class="layout">
    <nav class="tabs" id="tabs">
      <div class="tabs-label">Dividers</div>
      <!-- tabs injected -->
      <button class="tab-add" id="addCatBtn">+ new divider</button>
    </nav>

    <main class="content" id="content">
      <!-- content injected -->
    </main>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ============================================================
   STORAGE  — tries localStorage (works on GitHub Pages / opened
   locally); falls back to in-memory if the sandbox blocks it,
   so it never crashes in a preview. Data persists once deployed.
   ============================================================ */
const Store = (() => {
  let ok = true, mem = {};
  try { const k='__t'; localStorage.setItem(k,'1'); localStorage.removeItem(k); }
  catch(e){ ok = false; }
  return {
    persistent: ok,
    get(k){ try { return ok ? localStorage.getItem(k) : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
    set(k,v){ try { ok ? localStorage.setItem(k,v) : (mem[k]=v); } catch(e){ mem[k]=v; } },
  };
})();

const PKEY = 'binder:profiles:v1';
const dataKey = name => 'binder:data:v1:' + name.toLowerCase();

function loadProfiles(){ try { return JSON.parse(Store.get(PKEY)) || {}; } catch(e){ return {}; } }
function saveProfiles(p){ Store.set(PKEY, JSON.stringify(p)); }

   DEFAULT BINDER TEMPLATE
   ============================================================ */

/* ============================================================
   STATE
   ============================================================ */
let CURRENT = null;   // profile name
let DATA = null;      // {categories, items}
let activeCat = null; // category id or '__all'
let searchTerm = '';
let editingId = null; // item id being edited, or null for new

/* ============================================================
   HELPERS
   ============================================================ */
const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

function detectPlatform(url){
  if(!url) return null;
  const u = url.toLowerCase();
  if(u.includes('tiktok.com')) return {name:'TikTok', color:'#000000'};
  if(u.includes('instagram.com')) return {name:'Instagram', color:'#C13584'};
  if(u.includes('youtube.com')||u.includes('youtu.be')) return {name:'YouTube', color:'#c4302b'};
  if(u.includes('pinterest.')) return {name:'Pinterest', color:'#bd081c'};
  if(u.includes('reddit.com')) return {name:'Reddit', color:'#ff4500'};
  if(/^https?:\/\//.test(u)) return {name:'Link', color:'var(--ink-soft)'};
  return null;
}
function isUrl(s){ return /^https?:\/\/\S+$/i.test((s||'').trim()); }

function save(){ Store.set(dataKey(CURRENT), JSON.stringify(DATA)); }

function catById(id){ return DATA.categories.find(c=>c.id===id); }

function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ============================================================
   COVER / LOGIN
   ============================================================ */
function renderCover(){
  const profiles = loadProfiles();
  const names = Object.keys(profiles);
  const wrap = $('#existingWrap'), chips = $('#profileChips');
  if(names.length){
    wrap.classList.remove('hidden'); chips.innerHTML='';
    names.forEach(n=>{
      const b=document.createElement('button');
      b.className='profile-chip'; b.textContent=profiles[n].display || n;
      b.onclick=()=>{ $('#loginName').value = profiles[n].display || n; $('#loginPass').focus(); };
      chips.appendChild(b);
    });
  } else { wrap.classList.add('hidden'); }
  $('#coverNote').textContent = Store.persistent
    ? 'Saved on this device. Use “Backup” after logging in to keep a copy or move it to another device.'
    : 'Preview mode: this window won’t remember entries after a refresh. Once the file is on GitHub or opened directly, saving works normally.';
}

function doLogin(){
  const raw = $('#loginName').value.trim();
  const pass = $('#loginPass').value;
  const err = $('#loginErr'); err.textContent='';
  if(!raw){ err.textContent='Add a name so the binder knows whose it is.'; return; }
  const key = raw.toLowerCase();
  const profiles = loadProfiles();

  if(profiles[key]){
    if(profiles[key].pass && profiles[key].pass !== pass){
      err.textContent='That passcode doesn’t match this binder.'; return;
    }
  } else {
    profiles[key] = { display: raw, pass: pass || '' };
    saveProfiles(profiles);
    Store.set(dataKey(raw), JSON.stringify(defaultData()));
  }
  openBinder(profiles[key].display || raw);
}

/* ============================================================
   OPEN / RENDER APP
   ============================================================ */
function openBinder(displayName){
  CURRENT = displayName;
  try { DATA = JSON.parse(Store.get(dataKey(displayName))); } catch(e){ DATA=null; }
  if(!DATA || !DATA.categories){ DATA = defaultData(); save(); }
  activeCat = '__all';
  searchTerm = '';
  $('#whoName').textContent = displayName;
  $('#cover').classList.add('hidden');
  $('#app').classList.remove('hidden');
  renderTabs();
  renderContent();
}

function logout(){
  CURRENT=null; DATA=null;
  $('#app').classList.add('hidden');
  $('#cover').classList.remove('hidden');
  $('#loginName').value=''; $('#loginPass').value=''; $('#loginErr').textContent='';
  renderCover();
}

function renderTabs(){
  const nav=$('#tabs');
  nav.querySelectorAll('.tab, .all-tab').forEach(n=>n.remove());
  const addBtn=$('#addCatBtn');

  const total = DATA.items.length;
  const all=document.createElement('button');
  all.className='tab all-tab'+(activeCat==='__all'?' active':'');
  all.style.setProperty('--tabcolor','var(--brand)');
  all.innerHTML=`<span class="emoji">📖</span><span class="tname">Everything</span><span class="tcount">${total}</span>`;
  all.onclick=()=>{ activeCat='__all'; renderTabs(); renderContent(); };
  nav.insertBefore(all, $('.tabs-label').nextSibling);

  DATA.categories.forEach(c=>{
    const n=DATA.items.filter(i=>i.cat===c.id).length;
    const b=document.createElement('button');
    b.className='tab'+(activeCat===c.id?' active':'');
    b.style.setProperty('--tabcolor',c.color);
    b.innerHTML=`<span class="emoji">${c.emoji||'📄'}</span><span class="tname">${escapeHtml(c.name)}</span><span class="tcount">${n}</span>`;
    b.onclick=()=>{ activeCat=c.id; renderTabs(); renderContent(); };
    nav.insertBefore(b, addBtn);
  });
}

function renderContent(){
  const el=$('#content');
  const isAll = activeCat==='__all';
  const cat = isAll ? null : catById(activeCat);
  const color = isAll ? 'var(--brand)' : cat.color;

  let items = DATA.items.slice().sort((a,b)=>b.created-a.created);
  if(!isAll) items = items.filter(i=>i.cat===activeCat);
  if(searchTerm){
    const q=searchTerm.toLowerCase();
    items = items.filter(i =>
      (i.title||'').toLowerCase().includes(q) ||
      (i.details||'').toLowerCase().includes(q) ||
      (i.sub||'').toLowerCase().includes(q) ||
      (i.tags||[]).join(' ').toLowerCase().includes(q)
    );
  }

  let html = `
    <div class="content-head" style="--headcolor:${color}">
      <h1>${isAll?'<span class="h-emoji">📖</span>Everything':`<span class="h-emoji">${cat.emoji||''}</span>${escapeHtml(cat.name)}`}</h1>
      <div class="content-tools">
        <input class="searchbox" id="searchInput" type="text" placeholder="Search this binder" value="${escapeAttr(searchTerm)}" />
        ${isAll?'':`<button class="icon-btn" id="editCatBtn">Edit divider</button>`}
      </div>
    </div>`;
  if(!isAll && cat.desc) html += `<div class="cat-desc">${escapeHtml(cat.desc)}</div>`;
  else html += `<div class="cat-desc">Everything you’ve saved, newest first.</div>`;

  if(items.length===0){
    html += emptyState(isAll, cat);
    el.innerHTML=html;
    wireContent(cat);
    return;
  }

  // group by subtopic
  const groups={};
  items.forEach(i=>{ const s=i.sub||'Unsorted'; (groups[s]=groups[s]||[]).push(i); });
  const orderedSubs = isAll ? Object.keys(groups).sort()
    : [...(cat.subs||[]), 'Unsorted'].filter(s=>groups[s]).concat(
        Object.keys(groups).filter(s=>!(cat.subs||[]).includes(s) && s!=='Unsorted').sort());

  orderedSubs.forEach(sub=>{
    const list=groups[sub]; if(!list) return;
    html += `<section class="subgroup"><div class="subhead">
      <h2>${escapeHtml(sub)}</h2><span class="rule"></span><span class="n">${list.length} saved</span>
    </div><div class="cards">`;
    list.forEach(i=> html += cardHtml(i));
    html += `</div></section>`;
  });

  el.innerHTML=html;
  wireContent(cat);
}

function emptyState(isAll, cat){
  if(isAll){
    return `<div class="empty"><h3>Nothing in the binder yet</h3>
      <p>Next time your partner sends you a video, paste the link up top and write down what caught your eye. It’ll file itself.</p>
      <button class="btn" onclick="openEditor(null)">Add your first idea</button></div>`;
  }
  return `<div class="empty"><h3>The ${escapeHtml(cat.name)} divider is empty</h3>
    <p>Paste a link in the bar up top, or add an idea by hand. Pick a section like ${escapeHtml((cat.subs||['a topic'])[0])} so it stays tidy.</p>
    <button class="btn" onclick="openEditor(null,'${cat.id}')">Add to ${escapeHtml(cat.name)}</button></div>`;
}

function cardHtml(i){
  const cat=catById(i.cat);
  const color=cat?cat.color:'var(--brand)';
  const plat = i.platform ? `<span class="plat">${escapeHtml(i.platform)}</span>` : '';
  const dateStr = new Date(i.created).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  const statusMap={idea:['idea','To consider'],love:['love','Loving it'],decided:['decided','Decided']};
  const st=statusMap[i.status]||statusMap.idea;
  const tags=(i.tags||[]).map(t=>`<span class="tag">#${escapeHtml(t)}</span>`).join('');
  const long = (i.details||'').length>240;
  return `<article class="card" style="--cardcolor:${color}">
    <div class="card-tab"></div>
    <div class="card-body">
      <div class="card-meta">${plat}${plat && (cat||i.sub)?'<span>·</span>':''}
        ${cat?`<span>${escapeHtml(cat.name)}</span>`:''}${i.sub?`<span>·</span><span>${escapeHtml(i.sub)}</span>`:''}
        <span>·</span><span>${dateStr}</span>
        ${i.addedBy&&i.addedBy!==CURRENT?`<span>·</span><span>via ${escapeHtml(i.addedBy)}</span>`:''}
      </div>
      <h3>${escapeHtml(i.title||'Untitled idea')}</h3>
      ${i.details?`<div class="details${long?' clamp':''}" data-id="${i.id}">${escapeHtml(i.details)}</div>
        ${long?`<button class="expand" onclick="toggleClamp('${i.id}',this)">Read more</button>`:''}`:''}
      ${tags?`<div class="tags">${tags}</div>`:''}
      <div class="card-foot">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="status ${st[0]}">${st[1]}</span>
          ${i.cost?`<span class="cost">${escapeHtml(i.cost)}</span>`:''}
        </div>
        <div class="card-actions">
          ${i.source?`<a class="src" href="${escapeAttr(i.source)}" target="_blank" rel="noopener" title="Open the original">source ↗</a>`:''}
          <button onclick="openEditor('${i.id}')" title="Edit">edit</button>
          <button onclick="removeItem('${i.id}')" title="Delete">delete</button>
        </div>
      </div>
    </div>
  </article>`;
}

function toggleClamp(id,btn){
  const d=document.querySelector(`.details[data-id="${id}"]`);
  if(!d) return;
  d.classList.toggle('clamp');
  btn.textContent = d.classList.contains('clamp')?'Read more':'Show less';
}

function wireContent(cat){
  const s=$('#searchInput');
  if(s){ s.oninput=e=>{ searchTerm=e.target.value; const pos=e.target.selectionStart; renderContent();
    const ns=$('#searchInput'); if(ns){ ns.focus(); ns.setSelectionRange(pos,pos);} }; }
  const ec=$('#editCatBtn');
  if(ec && cat) ec.onclick=()=>openCatEditor(cat);
}

/* ============================================================
   ITEM EDITOR (the paste-preview / resume-style form)
   ============================================================ */
function openEditor(id, presetCat){
  editingId = id;
  const existing = id ? DATA.items.find(i=>i.id===id) : null;
  const seedCat = existing?.cat || presetCat || (activeCat!=='__all'?activeCat:DATA.categories[0].id);
  const seedSource = window._pendingSource || existing?.source || '';
  const seedTitle = window._pendingTitle || existing?.title || '';
  window._pendingSource=null; window._pendingTitle=null;

  const plat = detectPlatform(seedSource);
  const catOptions = DATA.categories.map(c=>`<option value="${c.id}" ${c.id===seedCat?'selected':''}>${escapeHtml(c.emoji+' '+c.name)}</option>`).join('');

  const overlay=document.createElement('div');
  overlay.className='overlay'; overlay.id='editorOverlay';
  overlay.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <div>
          <h2>${id?'Edit this idea':'New idea for the binder'}</h2>
          <p>Write it down properly — enough that it still makes sense if the video disappears.</p>
        </div>
        <button class="modal-close" id="closeEditor" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        ${seedSource?`<div class="preview-strip">
          <span class="badge" style="background:${plat?plat.color:'var(--ink-soft)'}">${plat?plat.name:'Link'}</span>
          <span class="u">${escapeHtml(seedSource)}</span>
        </div>`:''}
        <div class="field">
          <label>What is it?</label>
          <input id="fTitle" type="text" placeholder="e.g. Rattan pendant light over the island" value="${escapeAttr(seedTitle)}" />
        </div>
        <div class="field">
          <label>The idea, in your words</label>
          <textarea id="fDetails" class="big" placeholder="Why you saved it, the details that matter — brand, price, colours, the exact thing to recreate, who to ask. This is the part that survives.">${escapeHtml(existing?.details||'')}</textarea>
          <div class="hint">The more you write here, the less you rely on the link staying up.</div>
        </div>
        <div class="row2">
          <div class="field">
            <label>Divider</label>
            <select id="fCat">${catOptions}</select>
          </div>
          <div class="field">
            <label>Section</label>
            <input id="fSub" list="subList" placeholder="e.g. Kitchen" value="${escapeAttr(existing?.sub||'')}" />
            <datalist id="subList"></datalist>
          </div>
        </div>
        <div class="row2">
          <div class="field">
            <label>Where it's at</label>
            <select id="fStatus">
              <option value="idea" ${(!existing||existing.status==='idea')?'selected':''}>To consider</option>
              <option value="love" ${existing?.status==='love'?'selected':''}>Loving it</option>
              <option value="decided" ${existing?.status==='decided'?'selected':''}>Decided</option>
            </select>
          </div>
          <div class="field">
            <label>Rough cost <span style="text-transform:none;letter-spacing:0;">(optional)</span></label>
            <input id="fCost" type="text" placeholder="e.g. ~$120" value="${escapeAttr(existing?.cost||'')}" />
          </div>
        </div>
        <div class="field">
          <label>Tags <span style="text-transform:none;letter-spacing:0;">(comma separated, optional)</span></label>
          <input id="fTags" type="text" placeholder="cozy, warm-wood, splurge" value="${escapeAttr((existing?.tags||[]).join(', '))}" />
        </div>
        <div class="field">
          <label>Source link</label>
          <input id="fSource" type="text" placeholder="https://…" value="${escapeAttr(seedSource)}" />
          <div class="hint">Kept in the entry so you can always find the original.</div>
        </div>
      </div>
      <div class="modal-foot">
        <div class="left">${id?`<button class="btn btn-ghost btn-small" id="delFromEdit">Delete</button>`:''}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" id="cancelEditor">Cancel</button>
          <button class="btn" id="saveEditor">${id?'Save changes':'File it away'}</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  function refreshSubs(){
    const c=catById($('#fCat').value);
    $('#subList').innerHTML=(c?.subs||[]).map(s=>`<option value="${escapeAttr(s)}">`).join('');
    // live preview badge
    const src=$('#fSource').value.trim();
    const p=detectPlatform(src);
    const strip=overlay.querySelector('.preview-strip');
    if(strip && p){ strip.querySelector('.badge').textContent=p.name; strip.querySelector('.badge').style.background=p.color; strip.querySelector('.u').textContent=src; }
  }
  $('#fCat').onchange=refreshSubs;
  $('#fSource').oninput=refreshSubs;
  refreshSubs();

  $('#closeEditor').onclick=$('#cancelEditor').onclick=closeEditor;
  overlay.onclick=e=>{ if(e.target===overlay) closeEditor(); };
  $('#saveEditor').onclick=saveEditor;
  if($('#delFromEdit')) $('#delFromEdit').onclick=()=>{ closeEditor(); removeItem(id); };
  document.addEventListener('keydown', escClose);
  setTimeout(()=>$('#fTitle').focus(),50);
}
function escClose(e){ if(e.key==='Escape') closeEditor(); }
function closeEditor(){
  const o=$('#editorOverlay'); if(o) o.remove();
  document.removeEventListener('keydown', escClose);
  editingId=null;
}
function saveEditor(){
  const title=$('#fTitle').value.trim();
  const details=$('#fDetails').value.trim();
  if(!title && !details){ toast('Add at least a title or a note.'); $('#fTitle').focus(); return; }
  const rec = {
    title, details,
    cat: $('#fCat').value,
    sub: $('#fSub').value.trim(),
    status: $('#fStatus').value,
    cost: $('#fCost').value.trim(),
    tags: $('#fTags').value.split(',').map(t=>t.trim().replace(/^#/,'')).filter(Boolean),
    source: $('#fSource').value.trim(),
  };
  rec.platform = detectPlatform(rec.source)?.name || '';
  if(editingId){
    const it=DATA.items.find(i=>i.id===editingId);
    Object.assign(it, rec);
  } else {
    DATA.items.push({ id:uid(), created:Date.now(), addedBy:CURRENT, ...rec });
  }
  save();
  const savedCat=rec.cat;
  closeEditor();
  if(activeCat!=='__all' && activeCat!==savedCat) activeCat=savedCat;
  renderTabs(); renderContent();
  toast(editingId?'Saved.':'Filed away. ✓');
}

function removeItem(id){
  const it=DATA.items.find(i=>i.id===id);
  if(!it) return;
  if(!confirm(`Remove “${it.title||'this idea'}” from the binder?`)) return;
  DATA.items=DATA.items.filter(i=>i.id!==id);
  save(); renderTabs(); renderContent(); toast('Removed.');
}

/* ============================================================
   CATEGORY / DIVIDER EDITOR
   ============================================================ */
const PALETTE=[['Clay','var(--c-home)'],['Rose','var(--c-wedding)'],['Gold','var(--c-parties)'],
  ['Sage','var(--c-kids)'],['Blue','var(--c-travel)'],['Olive','var(--c-recipes)'],['Taupe','var(--c-custom)']];

function openCatEditor(cat){ // cat null = new
  const isNew=!cat;
  const overlay=document.createElement('div');
  overlay.className='overlay'; overlay.id='catOverlay';
  const swatches=PALETTE.map(([n,v])=>`<button type="button" class="swatch" data-c="${v}" title="${n}"
     style="width:30px;height:30px;border-radius:50%;background:${v};border:2px solid ${(cat?.color||PALETTE[0][1])===v?'var(--ink)':'transparent'};"></button>`).join('');
  overlay.innerHTML=`
    <div class="modal" style="max-width:460px" role="dialog" aria-modal="true">
      <div class="modal-head"><div><h2>${isNew?'New divider':'Edit divider'}</h2>
        <p>A tab in your binder — like Home, Wedding, or something all your own.</p></div>
        <button class="modal-close" id="closeCat">×</button></div>
      <div class="modal-body">
        <div class="row2">
          <div class="field"><label>Emoji</label><input id="cEmoji" maxlength="4" value="${escapeAttr(cat?.emoji||'📁')}" style="text-align:center;font-size:20px;"></div>
          <div class="field"><label>Name</label><input id="cName" value="${escapeAttr(cat?.name||'')}" placeholder="e.g. Garden"></div>
        </div>
        <div class="field"><label>A little description</label>
          <input id="cDesc" value="${escapeAttr(cat?.desc||'')}" placeholder="What lives under this tab"></div>
        <div class="field"><label>Tab colour</label>
          <div style="display:flex;gap:10px;flex-wrap:wrap;" id="cSwatches">${swatches}</div></div>
        <div class="field"><label>Sections <span style="text-transform:none;letter-spacing:0;">(one per line)</span></label>
          <textarea id="cSubs" class="big" placeholder="Kitchen&#10;Bedroom&#10;Outdoor">${escapeHtml((cat?.subs||[]).join('\n'))}</textarea></div>
      </div>
      <div class="modal-foot">
        <div class="left">${!isNew?`<button class="btn btn-ghost btn-small" id="delCat">Delete divider</button>`:''}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" id="cancelCat">Cancel</button>
          <button class="btn" id="saveCat">${isNew?'Add divider':'Save'}</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  let chosen=cat?.color||PALETTE[0][1];
  overlay.querySelectorAll('.swatch').forEach(sw=>sw.onclick=()=>{
    chosen=sw.dataset.c;
    overlay.querySelectorAll('.swatch').forEach(s=>s.style.border='2px solid transparent');
    sw.style.border='2px solid var(--ink)';
  });
  const close=()=>overlay.remove();
  $('#closeCat').onclick=$('#cancelCat').onclick=close;
  overlay.onclick=e=>{ if(e.target===overlay) close(); };
  if($('#delCat')) $('#delCat').onclick=()=>{
    const n=DATA.items.filter(i=>i.cat===cat.id).length;
    if(!confirm(`Delete the “${cat.name}” divider${n?` and its ${n} idea(s)`:''}?`)) return;
    DATA.categories=DATA.categories.filter(c=>c.id!==cat.id);
    DATA.items=DATA.items.filter(i=>i.cat!==cat.id);
    if(activeCat===cat.id) activeCat='__all';
    save(); close(); renderTabs(); renderContent(); toast('Divider deleted.');
  };
  $('#saveCat').onclick=()=>{
    const name=$('#cName').value.trim();
    if(!name){ toast('Give the divider a name.'); return; }
    const subs=$('#cSubs').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const payload={ name, emoji:$('#cEmoji').value.trim()||'📁', desc:$('#cDesc').value.trim(), color:chosen, subs };
    if(isNew){ payload.id=uid(); DATA.categories.push(payload); activeCat=payload.id; }
    else Object.assign(cat, payload);
    save(); close(); renderTabs(); renderContent(); toast(isNew?'Divider added.':'Saved.');
  };
  setTimeout(()=>$('#cName').focus(),50);
}

/* ============================================================
   QUICK ADD (top bar)
   ============================================================ */
function quickAdd(){
  const v=$('#quickInput').value.trim();
  if(!v){ $('#quickInput').focus(); return; }
  if(isUrl(v)){ window._pendingSource=v; }
  else { window._pendingTitle=v; }
  $('#quickInput').value='';
  openEditor(null);
}

/* ============================================================
   BACKUP / RESTORE
   ============================================================ */
function exportData(){
  const blob=new Blob([JSON.stringify({profile:CURRENT, exportedAt:new Date().toISOString(), data:DATA},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`binder-${CURRENT.toLowerCase()}-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup downloaded.');
}
function importData(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const parsed=JSON.parse(r.result);
      const d=parsed.data||parsed;
      if(!d.categories||!d.items) throw new Error('bad');
      if(!confirm('Load this binder? It replaces what’s currently open for this profile.')) return;
      DATA=d; save(); renderTabs(); renderContent(); toast('Binder restored.');
    }catch(e){ toast('That file didn’t look like a binder backup.'); }
  };
  r.readAsText(file);
}

/* ============================================================
   ESCAPING
   ============================================================ */
function escapeHtml(s){ return (s??'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ============================================================
   WIRE UP
   ============================================================ */
$('#loginBtn').onclick=doLogin;
$('#loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
$('#loginName').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
$('#quickBtn').onclick=quickAdd;
$('#quickInput').addEventListener('keydown',e=>{ if(e.key==='Enter') quickAdd(); });
$('#addCatBtn').onclick=()=>openCatEditor(null);
$('#logoutBtn').onclick=logout;
$('#exportBtn').onclick=exportData;
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=''; };

renderCover();
</script>
</body>
</html>
